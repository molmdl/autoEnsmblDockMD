; =============================================================================
; autoEnsmblDockMD pipeline configuration template
;
; Usage:
;   cp scripts/config.ini.template config.ini
;   bash scripts/run_pipeline.sh --config config.ini --stage rec_prep --dry-run
;
; Notes:
; - Values can be overridden via environment variables in scripts/infra/config_loader.sh
; - Paths may be absolute or relative to the current working directory
; - AMBER and CHARMM examples are included in comments where relevant
; =============================================================================

[general]
; Root workspace for this run
workdir = ./work/test

[slurm]
; Default Slurm partition for GPU jobs on mgpu cluster
partition = rtx4090-short
; OpenMP threads per task (used by many gmx stages)
ntomp = 8
; GPUs requested per job
gpus = 1
; CPU count for scripts using cpus_per_task key
cpus_per_task = 8

[receptor]
; Receptor stage working directory
workdir = ${general:workdir}/rec
; Input receptor structure (PDB)
input_pdb = receptor.pdb
; Force field name passed to gmx pdb2gmx
; CHARMM example: charmm36
; AMBER example: amber19sb
ff = charmm36
; Water model used by pdb2gmx
water_model = tip3p
; Solvation box distance in nm
box_distance = 1.0
; Ion concentration for genion (M)
ion_conc = 0.15
; Directory containing receptor-stage MDP files
mdp_dir = ./mdp/rec
; Energy minimization MDP file name
em_mdp = em.mdp
; Position-restrained equilibration MDP file name
pr_pos_mdp = pr_pos.mdp
; Production/equilibration MDP for 1_pr_rec.sh
pr0_mdp = pr0.mdp
; Number of receptor production trials (Slurm array size)
n_trials = 4
; Ensemble size expected after clustering
ensemble_size = 10
; Prefix used for receptor conformers (e.g., rec0, rec1)
ensemble_prefix = rec
; Optional receptor extension override when copying ensemble to dock
; Leave empty to auto-detect .pdb/.gro
receptor_ext =
; Receptor prefix used in docking scripts
receptor_prefix = rec
; Optional explicit ensemble source directory for dock prep
ensemble_dir = ${receptor:workdir}
; Receptor analysis start time (ps)
analysis_start_ps = 10000
; GROMACS group IDs for rec/3_ana.sh
pbc_center_group = 1
fit_group = 4
rms_group = 4
rmsf_group_bb = 4
rmsf_group_noh = 2
merged_fit_group = 1
; Output names for merged trajectory products
merged_out = apo_50ns_merged.xtc
merged_fit_out = apo_50ns_merged_fit.xtc
; Clustering controls
cluster_method = gromos
cluster_xtc = apo_50ns_merged_fit.xtc
cluster_tpr = pr_0.tpr
cluster_cutoff = 0.2
cluster_rmsmin = 0.1
cluster_group = 1
cluster_output = clusters.xtc
write_pdb = true
; MDAnalysis align settings for rec/5_align.py
; Comma-separated file list or glob patterns
align_structures = ${receptor:workdir}/rec*.pdb
; Reference structure for alignment
align_reference = ${general:workdir}/dock/ref.pdb
; Output directory for aligned structures
align_output_dir = ${receptor:workdir}/aligned
; Atom selection string used by MDAnalysis
align_selection = backbone
; Optional output prefix for aligned files
align_output_prefix = aln_
; pdb2pqr controls for receptor protonation
pdb2pqr_ff = AMBER
ph = 7.4

[dock]
; Legacy conversion section used by 0_gro2mol2.sh / 0_sdf2gro.sh
ligand_dir = ${general:workdir}/dock
output_dir = ${general:workdir}/dock
gro_pattern = *.gro
itp_suffix = _gmx.top
converter_script = scripts/dock/0_gro_itp_to_mol2.py
sdf_input_dir = ${general:workdir}/dock
sdf_pattern = **/*.sdf
recurse = true

[docking]
; Docking workspace
dock_dir = ${general:workdir}/dock
; Ligand source directory for docking
ligands_dir = ${docking:dock_dir}
; Ligand discovery glob under ligands_dir
ligand_pattern = lig*
; Optional explicit ligand list (comma-separated)
ligand_list =
; Mode: blind | targeted | test
mode = blind
; Directory containing receptor conformers for docking
receptor_dir = ${docking:dock_dir}
; Optional override for receptor source before copying
receptor_source_dir = ${receptor:workdir}
; Prefix for receptor conformers
receptor_prefix = rec
; Symlink receptors into dock_dir instead of copy
link_receptors = false
; Reference ligand used for targeted/test autobox
reference_ligand = ${docking:dock_dir}/ref.pdb
; Test-mode receptor
test_receptor = ${docking:receptor_dir}/${docking:receptor_prefix}0.pdb
; gnina run controls
exhaustiveness = 100
num_modes = 32
; Maximum receptor-conformer jobs to run in parallel per ligand
ensemble_parallelism = 1
autobox_add = 4
; autobox_ligand = receptor OR path-to-reference-ligand
autobox_ligand = receptor
; Base scoring function passed to gnina --scoring.
; Valid values: ad4_scoring default dkoes_fast dkoes_scoring dkoes_scoring_old vina vinardo
; Leave empty to use gnina default (vina).
scoring =
; CNN scoring/reranking mode passed to gnina --cnn_scoring.
; Valid values: none rescore refinement metrorescore metrorefine all
; Default (rescore): CNN rescores and reranks poses generated by the base scorer.
cnn_scoring = rescore
; Pose sort order passed to gnina --pose_sort_order.
; Valid values: CNNscore CNNaffinity Energy
; Default (CNNscore): sort final poses by CNN predicted binding score.
pose_sort_order = CNNscore
addH = off
stripH = off
cpu = 8
min_rmsd_filter = 3
; Docking report outputs
report_output = ${docking:dock_dir}/dock_report.csv
report_format = csv
report_top_n = 0

[dock2com]
; Output directory for new-ligand complex setup
com_dir = ${general:workdir}/com
; Force-field mode for topology assembly: amber|charmm
; AMBER example: amber
; CHARMM example: charmm
ff = amber
; Optional pose index for selecting SDF pose (empty => first/best rule in helper)
pose_index =
; Position restraint force constant (kJ mol^-1 nm^-2)
force_constant = 1000
; Receptor topology source file
rec_top = ${general:workdir}/rec/#topol.top.1#
; Patterns with {ligand} placeholder
ligand_itp_pattern = {ligand}.itp
ligand_template_pattern = {ligand}.mol2
sdf_pattern = rec*-{ligand}.sdf
; Copy rec.itp into output ligand folder when present
copy_rec_itp = true

[dock2com_ref]
; Reference-ligand parameter directory
ref_dir = ${general:workdir}/ref
; Optional explicit reference ligands (comma-separated)
ligand_list =
; Directory matching pattern in dock dir for reference ligands
ligand_pattern = *
; Output directory for reference-ligand complexes
com_dir = ${general:workdir}/com/ref
; Force-field mode for topology assembly: amber|charmm
ff = amber
pose_index =
force_constant = 1000
rec_top = ${general:workdir}/rec/#topol.top.1#
ligand_itp_pattern = {ligand}.itp
ligand_template_pattern = {ligand}.mol2
sdf_pattern = rec*-{ligand}.sdf
copy_rec_itp = true

[complex]
; Complex preparation stage workdir
workdir = ${general:workdir}/com
; AMBER or CHARMM complex prep mode
; AMBER example: amber
; CHARMM example: charmm
mode = charmm
; Ligand source directory for complex prep
ligand_dir = ${general:workdir}/dock
; Ligand discovery pattern/list
ligand_pattern = lig*
ligand_list =
; Receptor files used for complex assembly
receptor_gro = ${general:workdir}/rec/prot.gro
receptor_top = ${general:workdir}/rec/topol.top
; Force field tag used to derive defaults in scripts
; CHARMM example: charmm36
; AMBER example: amber19sb
ff = charmm36
; Forcefield include path written into sys.top
; CHARMM example: charmm36.ff/forcefield.itp
; AMBER example: amber19sb.ff/forcefield.itp
ff_include = charmm36.ff/forcefield.itp
water_model = tip3p
; Solvent coordinates passed to `gmx solvate -cs` (filename or absolute path)
; Use coordinate source, not model label (e.g., spc216.gro)
solvent_coordinates = spc216.gro
box_distance = 1.0
ion_conc = 0.15
; MDP directory and file names for complex prep
mdp_dir = ./mdp/com
em_mdp = em.mdp
pr_pos_mdp = pr.mdp
; Optional explicit ligand filenames inside ligand dir
ligand_itp =
ligand_gro =
; AMBER-only bypass script path
bypass_script = scripts/com/bypass_angle_type3.py

[production]
; Production stage workdir (defaults to complex workdir)
workdir = ${complex:workdir}
; Ligand directory/pattern/list for production runs
ligand_dir = ${production:workdir}
ligand_pattern = ${complex:ligand_pattern}
ligand_list = ${complex:ligand_list}
; Number of production trajectories per ligand
n_trials = 4
; Number of additional equilibration stages after pr0
n_equilibration_stages = 1
; Initial GRO file in ligand folder used for pr0 grompp
equil_input_gro = pr_pos.gro
; Index file name in ligand folder
index_file = index.ndx
; MDP controls
mdp_dir = ./mdp/com
pr0_mdp = pr0.mdp
pr_mdp_prefix = pr
production_mdp = md.mdp
; Label for production duration (used in Slurm job naming)
md_time = 100ns
; Resource overrides for production jobs
ntomp = 8
partition = rtx4090
gpus = 1

[mmpbsa]
; MM/PBSA workspace and ligand discovery
workdir = ${complex:workdir}
ligand_dir = ${mmpbsa:workdir}
ligand_pattern = ${complex:ligand_pattern}
ligand_list = ${complex:ligand_list}
; Number of chunks per trajectory for parallel MM/PBSA
n_chunks = 4
; Prefix for chunk output directories
chunk_dir_prefix = mmpbsa_
; Group names and derived index handling
receptor_group = Protein
ligand_group = Other
complex_group_name = Protein_Other
index_file = index.ndx
; Trajectory/topology filename patterns with %d trial index
source_xtc_pattern = prod_%d.xtc
source_tpr_pattern = prod_%d.tpr
; MM/PBSA input and scripts
mmpbsa_input = scripts/com/mmpbsa.in
trj_script = scripts/com/2_trj4mmpbsa.sh
submit_script = scripts/com/2_sub_mmpbsa.sh
mmpbsa_script = scripts/com/2_mmpbsa.sh
; Persisted receptor/ligand/complex group IDs written by trajectory-prep step
group_ids_file = mmpbsa_groups.dat
; Slurm CPU settings for MM/PBSA arrays
partition = cpu
cpus_per_task = 16
array_parallelism =
; Runtime options for per-chunk mmpbsa jobs
mpi_ranks = 16
; Optional fixed group IDs (typically resolved dynamically)
receptor_group_id = 1
ligand_group_id = 12
; Topology controls
ff = ${complex:ff}
topology_file =
amber_topology_file = bypass_sys.top
charmm_topology_file = sys.top

[analysis]
; Analysis output subdirectory in each ligand folder
output_subdir = analysis
; Toggle analysis blocks
run_rmsd = true
run_rmsf = true
run_hbond = true
run_advanced = true
; Plot formatting controls
plot_format = png
plot_dpi = 300
; Contact cutoff for advanced MDAnalysis contacts (angstrom)
contact_cutoff = 4.5
; Advanced distance reference selection key
distance_reference = protein_backbone
; Optional explicit atom selections (comma/newline separated)
selections =
; GROMACS group IDs
gmx_rmsd_ref_group = 4
gmx_rmsd_mobile_group = 4
gmx_rmsf_group = 4
gmx_hbond_group_a = 1
gmx_hbond_group_b = 13
; Optional target ligand list for analysis stage
ligand_list =

[fingerprint]
; Optional fingerprint utility stage defaults
workdir = ${complex:workdir}
ligand_dir = ${fingerprint:workdir}
ligand_pattern = ${complex:ligand_pattern}
ligand_list =
trajectory = com_traj.xtc
topology = com.tpr
output_dir = fp
output_prefix = fingerprint
ligand_selection = resname MOL and not name H*
receptor_selection = protein and not name H*
cutoff = 4.5
summary_csv = ${fingerprint:workdir}/fingerprint_summary.csv
fp_script = scripts/com/4_fp.py

[archive]
; Optional archive-selection utility stage defaults
workdir = ${complex:workdir}
ligand_dir = ${archive:workdir}
ligand_pattern = ${complex:ligand_pattern}
ligand_list =
archive_dir = ${archive:workdir}/archive
include_patterns = *.gro,*.xtc,*.xvg,mmpbsa_*/FINAL_RESULTS_MMPBSA.dat,mmpbsa_*/FINAL_RESULTS_MMPBSA.csv
dry_run = false
compress_level = 6

[rerun]
; Optional rerun-selection utility stage defaults
workdir = ${complex:workdir}
ligand_dir = ${rerun:workdir}
ligand_pattern = ${complex:ligand_pattern}
ligand_list =
stage = prod
expected_prep = pr_pos.gro,sys.top,index.ndx
expected_prod = prod_0.xtc,prod_0.tpr
expected_mmpbsa = mmpbsa_0/FINAL_RESULTS_MMPBSA.dat
prep_script = scripts/com/0_prep.sh
prod_script = scripts/com/1_pr_prod.sh
mmpbsa_script = scripts/com/2_sub_mmpbsa.sh
partition = ${slurm:partition}
cpus_per_task = 4

[monitor_patterns]
; Optional log-monitor override patterns (separate multiple regexes with ||)
error_patterns =
warning_patterns =
completion_markers =
; 0 = no limit
max_matched_lines = 0
